# ─── SonarQube / SonarCloud project configuration ────────────────────────────
# Run: npx sonar-scanner  (requires SONAR_TOKEN env var or sonar.login below)

sonar.projectKey=matchdb-shell-ui
sonar.projectName=MatchDB Shell UI
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=src,server
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Language
sonar.language=ts

# Exclusions — skip generated artifacts, deps, and config files
sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  certs/**,\
  **/*.config.js,\
  **/*.config.ts,\
  public/**,\
  coverage/**

# Coverage (populate after adding Jest + coverage reporter)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8

# SonarQube server (override via SONAR_HOST_URL env var for CI/CD)
# sonar.host.url=https://sonarcloud.io
# sonar.organization=your-org-key
# sonar.login=${SONAR_TOKEN}
